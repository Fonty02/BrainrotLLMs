# Steering experiment matrix configuration
# All combinations of model × technique × layer_pct generate one HTCondor job

common:
  models:
    - Qwen/Qwen2.5-7B-Instruct
    - meta-llama/Llama-3.1-8B-Instruct
    - google/gemma-4-E2B-it

  techniques:
    - dom
    - pca
    - aas

  layer_pcts:
    - 25
    - 50
    - 75

  # Coefficient grids are now per-technique because the units differ:
  #   dom/pca → multiples of the natural brainrot−normal difference vector
  #             (comparable across layers/models regardless of residual scale)
  #   aas     → rotation angle in degrees
  # Leave coefficients_by_technique empty to fall back to the script defaults.
  coefficients_by_technique:
    dom: "1,2,3,4,-2,-4"
    pca: "1,2,3,4,-2,-4"
    aas: "15,25,35,45,-25,-45"

  # Steer a band of layers around the target (0 = single layer).
  layer_band: 0

  # Decoding: greedy by default. Set do_sample: true to reduce repetition
  # collapse and get more natural style (less reproducible).
  do_sample: false
  temperature: 0.8
  top_p: 0.9
  repetition_penalty: 1.3
  max_new_tokens: 200

  max_pairs: 2000

  # HuggingFace token (set via environment or HTCondor)
  # HF_TOKEN env var will be forwarded

  # HuggingFace cache dir on shared filesystem
  hf_cache_dir: /scratch/huggingface_cache

  # Device for GPU jobs
  device: cuda

htc:
  executable: run_steering.sh
  output_dir: steering_submit_files
  logs_dir: steering_logs

  request_cpus: 10
  request_gpus: 1
  request_memory: 64GB
  request_disk: 20GB

  # Results go to a shared directory, each job gets its own CSV
  results_dir: steering_results

  # Send HF_TOKEN from environment
  getenv: True

  # Max jobs per submit file
  max_jobs_per_file: 27

  # HTCondor requirements (optional GPU class)
  requirements: (TARGET.CUDACapability >= 7.0)

# Optional: split questions across N workers per configuration
q_slices: 1
